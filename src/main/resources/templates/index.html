<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Equipo de futbol</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h2>PAGINA DE INICIO</h2>
        <p th:text="${mensaje}" ></p>
        <p th:text="${dato}" ></p>
        <hr>
        <h2>Equipo Favorito</h2>
        <b>NOMBRE:</b>
        <span th:text="${equipoFavorito.nombre}"></span><br>

        <b>ESLOGAN:</b>
        <span th:text="${equipoFavorito.eslogan}"></span><br>

        <b>TÉCNICO:</b>
        <span th:text="${equipoFavorito.tecnico}"></span><br>

        <b>PAÍS:</b>
        <span th:text="${equipoFavorito.pais}"></span><br>

        <b>CIUDAD:</b>
        <span th:text="${equipoFavorito.ciudad}"></span><br>

        <b>CATEGORÍA:</b>
        <span th:text="${equipoFavorito.categoria}"></span><br>

        <b>GOLES:</b>
        <span th:text="${equipoFavorito.numGoles}"></span><br>

        <b>PARTIDOS JUGADOS:</b>
        <span th:text="${equipoFavorito.numPartidosJugados}"></span><br>

        <b>PARTIDOS GANADOS:</b>
        <span th:text="${equipoFavorito.numPartidosGanados}"></span><br>

        <b>CAMPEONATOS:</b>
        <span th:text="${equipoFavorito.numCampeonatos}"></span><br>

        <b>EXPULSIONES:</b>
        <span th:text="${equipoFavorito.numExpulsiones}"></span><br>

        <b>EMPATES:</b>
        <span th:text="${equipoFavorito.numEmpates}"></span><br>

        <hr>
        
        <div th:if="${equipos != null and !equipos.empty}">
            <table border="1" cellspacing="1" cellpadding="1">
                <thead>
                    <tr>
                        <th>NOMBRE</th>
                        <th>ESLOGAN</th>
                        <th>TECNICO</th>
                        <th>PAIS</th>
                        <th>CIUDAD</th>
                        <th>CATEGORIA</th>
                        <th>GOLES</th>
                        <th>PARTIDOS JUGADOS</th>
                        <th>PARTIDOS GANADOS</th>
                        <th>CAMPEONATOS</th>
                        <th>EXPULSIONES</th>
                        <th>EMPATES</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="e: ${equipos}">
                        <td th:text="${e.nombre}" ></td>
                        <td th:text="${e.eslogan}" ></td>
                        <td th:text="${e.tecnico}" ></td>
                        <td th:text="${e.pais}" ></td>
                        <td th:text="${e.ciudad}" ></td>
                        <td th:text="${e.categoria}" ></td>
                        <td th:text="${e.numGoles}" ></td>
                        <td th:text="${e.numPartidosJugados}" ></td>
                        <td th:text="${e.numPartidosGanados}" ></td>
                        <td th:text="${e.numCampeonatos}" ></td>
                        <td th:text="${e.numExpulsiones}" ></td>
                        <td th:text="${e.numEmpates}" ></td>
                    </tr>
                </tbody>
            </table>

        </div>    
        
    </body>
</html>
