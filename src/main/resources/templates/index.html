<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Equipo de futbol</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>
    <body>
        <header th:replace="plantillas/partes :: cabecero" ></header>
        <h2>PAGINA DE INICIO</h2>

        <a th:href="@{/agregar}" class="agregar-equipo">
            Agregar equipo
        </a>

        <div th:if="${equipos != null and !equipos.empty}">
            <div class="contenedor-cards">

                <div class="card-equipo" th:each="e : ${equipos}">

                    <div class="card-header">
                        <h3 th:text="${e.nombre}"></h3>
                        <span class="categoria" th:text="${e.categoria}"></span>
                    </div>

                    <div class="card-body">

                        <p><strong>Eslogan:</strong> <span th:text="${e.eslogan}"></span></p>
                        <p><strong>Técnico:</strong> <span th:text="${e.tecnico}"></span></p>
                        <p><strong>País:</strong> <span th:text="${e.pais}"></span></p>
                        <p><strong>Ciudad:</strong> <span th:text="${e.ciudad}"></span></p>

                        <div class="estadisticas">

                            <div class="stat">
                                <span class="numero" th:text="${e.numGoles}"></span>
                                <span>Goles</span>
                            </div>

                            <div class="stat">
                                <span class="numero" th:text="${e.numPartidosJugados}"></span>
                                <span>Jugados</span>
                            </div>

                            <div class="stat">
                                <span class="numero" th:text="${e.numPartidosGanados}"></span>
                                <span>Ganados</span>
                            </div>

                            <div class="stat">
                                <span class="numero" th:text="${e.numCampeonatos}"></span>
                                <span>Títulos</span>
                            </div>

                            <div class="stat">
                                <span class="numero" th:text="${e.numExpulsiones}"></span>
                                <span>Expulsiones</span>
                            </div>

                            <div class="stat">
                                <span class="numero" th:text="${e.numEmpates}"></span>
                                <span>Empates</span>
                            </div>

                        </div>

                    </div>

                    <div class="acciones">

                        <a class="btn editar"
                           th:href="@{/editar/{id}(id=${e.id})}">
                            Editar
                        </a>

                        <a class="btn eliminar"
                           th:href="@{/eliminar/{id}(id=${e.id})}">
                            Eliminar
                        </a>

                    </div>

                </div>

            </div>

        </div>    

        <div th:if="${equipos == null or equipos.empty}">
            La lista de equipos está vacía
        </div>

        <footer th:replace="plantillas/partes :: piecero" ></footer>

    </body>
</html>
