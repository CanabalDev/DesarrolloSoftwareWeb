<html  xmlns:th="http://www.thymeleaf.org" 
       xmlns="http://www.w3.org/1999/xhtml"
       >
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>
    <body>

        <div class="form-container">

            <div class="form-card">

                <h1 th:text="#{equipo.formulario}"></h1>

                <a class="btn-volver" th:href="@{/}">
                    ← Regresar
                </a>

                <form th:action="@{/guardar}" method="POST" th:object="${equipo}">

                    <input type="hidden" th:field="*{id}" />

                    <div class="campo">
                        <label th:text="#{equipo.nombre}"></label>
                        <input type="text" th:field="*{nombre}" />
                        <span class="error"
                              th:if="${#fields.hasErrors('nombre')}"
                              th:errors="*{nombre}"></span>
                    </div>

                    <div class="campo">
                        <label th:text="#{equipo.eslogan}"></label>
                        <input type="text" th:field="*{eslogan}" />
                    </div>

                    <div class="campo">
                        <label th:text="#{equipo.tecnico}"></label>
                        <input type="text" th:field="*{tecnico}" />
                        <span class="error"
                              th:if="${#fields.hasErrors('tecnico')}"
                              th:errors="*{tecnico}"></span>
                    </div>

                    <div class="campo">
                        <label th:text="#{equipo.pais}"></label>
                        <input type="text" th:field="*{pais}" />
                        <span class="error"
                              th:if="${#fields.hasErrors('pais')}"
                              th:errors="*{pais}"></span>
                    </div>

                    <div class="campo">
                        <label th:text="#{equipo.ciudad}"></label>
                        <input type="text" th:field="*{ciudad}" />
                        <span class="error"
                              th:if="${#fields.hasErrors('ciudad')}"
                              th:errors="*{ciudad}"></span>
                    </div>

                    <div class="campo">
                        <label th:text="#{equipo.categoria}"></label>
                        <input type="text" th:field="*{categoria}" />
                        <span class="error"
                              th:if="${#fields.hasErrors('categoria')}"
                              th:errors="*{categoria}"></span>
                    </div>

                    <div class="stats-grid">

                        <div class="campo">
                            <label th:text="#{equipo.numGoles}"></label>
                            <input type="number" th:field="*{numGoles}" />
                        </div>

                        <div class="campo">
                            <label th:text="#{equipo.numPartidosJugados}"></label>
                            <input type="number" th:field="*{numPartidosJugados}" />
                        </div>

                        <div class="campo">
                            <label th:text="#{equipo.numPartidosGanados}"></label>
                            <input type="number" th:field="*{numPartidosGanados}" />
                        </div>

                        <div class="campo">
                            <label th:text="#{equipo.numCampeonatos}"></label>
                            <input type="number" th:field="*{numCampeonatos}" />
                        </div>

                        <div class="campo">
                            <label th:text="#{equipo.numExpulsiones}"></label>
                            <input type="number" th:field="*{numExpulsiones}" />
                        </div>

                        <div class="campo">
                            <label th:text="#{equipo.numEmpates}"></label>
                            <input type="number" th:field="*{numEmpates}" />
                        </div>

                    </div>

                    <div class="botones-form">

                        <input class="btn-reset"
                               type="reset"
                               th:value="#{accion.reiniciar}" />

                        <input class="btn-save"
                               type="submit"
                               th:value="#{accion.guardar}" />

                    </div>

                </form>

            </div>

        </div>

    </body>
</html>
